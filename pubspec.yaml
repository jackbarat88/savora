    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.3
  intl: ^0.19.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
